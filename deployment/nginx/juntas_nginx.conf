# ── landing.mollo-ai.com — MolloIA brand landing page ─────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name landing.mollo-ai.com;

    ssl_certificate     /etc/letsencrypt/live/landing.mollo-ai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/landing.mollo-ai.com/privkey.pem;

    root /var/www/mollo-ai/landing;
    index index.html;
    autoindex off;

    # gzip — text content
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Long cache for brand assets
    location ~* \.(png|jpe?g|svg|webp|ico|woff2?|ttf|pdf)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    # HTML — short cache + full security headers
    location / {
        add_header Cache-Control "public, max-age=600" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        try_files $uri $uri/ =404;
    }
}

# ── mollo-ai.com (apex) — HTTPS, 301 to landing ────────────────
server {
    listen 443 ssl;
