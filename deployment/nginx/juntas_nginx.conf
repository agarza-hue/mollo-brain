# ── MCP Mollo Bridge (HTTPS — SSE para claude.ai) ──────────────
server {
    listen 443 ssl;
    http2 on;
    server_name media.bion-business.com;

    ssl_certificate     /etc/letsencrypt/live/media.bion-business.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/media.bion-business.com/privkey.pem;

    client_max_body_size 64m;

    location /mcp/ {
        proxy_pass http://172.20.0.1:3456/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';

        # SSE — sin buffering, timeouts largos
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;

        # CORS para claude.ai
        add_header Access-Control-Allow-Origin "https://claude.ai" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, mcp-session-id, last-event-id" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80;
    server_name media.bion-business.com;
    return 301 https://$host$request_uri;
}

# ── app.mollo-ai.com — Mollo OS (port 80: ACME challenge + redirect) ───
server {
    listen 80;
    server_name app.mollo-ai.com;

    location /.well-known/acme-challenge/ {
        root /etc/letsencrypt/webroot;
        try_files $uri =404;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

