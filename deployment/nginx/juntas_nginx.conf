# ── App principal (HTTP para otros hosts) ───────────────────────
server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 10M;

    # ── SinergyOS (Next.js en host :3003) ─────────────────────────
    location /sinergy {
        proxy_pass http://172.20.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_read_timeout 180s;
    }

    # ── Mollo Web (Next.js en host :3001) ──────────────────────────
    location /mollo {
        proxy_pass http://172.20.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        # Necesario para streaming SSE / chunked
        proxy_buffering off;
        proxy_read_timeout 180s;
    }

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── stream.mollo-ai.com — MolloStream (port 80: ACME + redirect 443) ──
server {
    listen 80;
    server_name stream.mollo-ai.com;

    location /.well-known/acme-challenge/ {
        root /etc/letsencrypt/webroot;
        try_files $uri =404;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── stream.mollo-ai.com — HTTPS proxy → host :8085 (MolloStream UI) ──
server {
    listen 443 ssl;
    http2 on;
    server_name stream.mollo-ai.com;

    ssl_certificate     /etc/letsencrypt/live/stream.mollo-ai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stream.mollo-ai.com/privkey.pem;

    client_max_body_size 100m;

    # MolloStream necesita websockets para live preview + long-running RTMP
    location / {
        # restreamer container está en la misma red juntas_net — accesible por
        # nombre. Puerto 8080 es interno (no expuesto al host público).
        proxy_pass http://restreamer:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
