# ── mollo-ai.com (apex) — port 80: ACME challenge + redirect to landing ─
# Apex DNS sigue 1/3 al VPS por round-robin con AWS. Cuando caen aquí,
# 301 al landing canónico v2 en lugar de juntas-app login.
server {
    listen 80;
    server_name mollo-ai.com;

    location /.well-known/acme-challenge/ {
        root /etc/letsencrypt/webroot;
        try_files $uri =404;
    }
    location / {
        return 301 https://landing.mollo-ai.com$request_uri;
    }
}

# ── app.mollo-ai.com — Mollo OS (HTTPS proxy → host :3006) ─────────────
server {
    listen 443 ssl;
    http2 on;
    server_name app.mollo-ai.com;

    ssl_certificate     /etc/letsencrypt/live/app.mollo-ai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.mollo-ai.com/privkey.pem;

    client_max_body_size 25m;

    # gzip — text content only (skip pre-compressed binaries)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/javascript application/json application/xml image/svg+xml;

    # When a backend is down (mollo_brain or Next dev), show a friendly
    # auto-refreshing page instead of nginx's stock 502.
    proxy_intercept_errors on;
    error_page 502 503 504 /__maintenance.html;

    location = /__maintenance.html {
        internal;
        root /var/www/mollo-ai;
        try_files /maintenance.html =404;
        add_header Cache-Control "no-store" always;
        add_header Retry-After "3" always;
    }

    # MolloIA billing endpoints → bypass Next.js, proxy directly to
    # mollo_brain on the host (172.20.0.1:8002). Used by /billing/checkout,
    # /billing/success, /billing/cancel, /billing/webhook.
    location /billing/ {
        proxy_pass http://172.20.0.1:8002/billing/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 30s;
        # Stripe webhooks need the raw body; nginx defaults are fine here.
    }

    # Brand assets in /landing/ — long cache (30d, immutable)
    # Regex matched BEFORE prefix locations, so this wins over /landing/.
    location ~* ^/landing/.+\.(png|jpe?g|svg|webp|ico|woff2?|ttf|pdf)$ {
        root /var/www/mollo-ai;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    # Landing HTML / dir index — short cache, full security headers
    location /landing/ {
        root /var/www/mollo-ai;
        index index.html;
        autoindex off;
        add_header Cache-Control "public, max-age=600" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        try_files $uri $uri/ =404;
    }

    # Legacy /mollo/* (chat + dashboard) → mollo-web en :3001.
    # Prefix match más largo que `location /` gana, así que esto rutea ANTES
    # que el catch-all hacia mollo-os (3006). Mantener mientras mollo-os no
    # tenga su propio dashboard de costos integrado.
    location /mollo {
        proxy_pass http://172.20.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location / {
        proxy_pass http://172.20.0.1:3006;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js HMR + chat SSE — keep connection upgradable, no buffering
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # Security headers for the app
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }
}

# ── www.mollo-ai.com — HTTPS, 301 to apex (which lives on AWS) ────────
